services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://todo_user:todo_password@database:5432/todo_db

  frontend:
    build: ./frontend
    ports:
      - "5050:80"
    environment:
      BACKEND_URL: http://backend:8000
